[io]
outdir:  "auto"        # output directory ("auto" → "runko_output")
prefix:  "3d_"         # filename prefix for output files
postfix: "_v1_test1"   # filename postfix for output files

[grid]
Nx: 8                  # number of MPI tiles per dimension
Ny: 2
Nz: 2
NxMesh: 32             # grid cells per tile per dimension (dx=dy=dz=1)
NyMesh: 32
NzMesh: 32
xmin: 0                # lower corner of the domain in code units
ymin: 0
zmin: 0

[simulation]
Nt:  1000              # total number of time steps
cfl: 0.45              # Courant number dt/dx; must be <0.5

[particles]
ppc: 2                 # macro-particles per cell per species
m0: 1                  # electron mass in normalized units
m1: 1                  # ion/positron mass in normalized units
theta: 1e-5            # electron temperature kT/(mc²)
theta_ratio: 1         # ion-to-electron temperature ratio

[problem]
sigma: 0.1             # magnetization σ = B²/(4π γ n m c²)
c_omp: 3               # skin-depth resolution c/ωp in cells
upstream_gamma: 3.0    # bulk Lorentz factor of the upstream flow
n_filter_passes: 4     # current smoothing passes per step (halo refresh every 3rd)

bx_proj: 0.0           # B-field direction cosines
by_proj: 0.0           # (must satisfy bx² + by² + bz² = 1)
bz_proj: 1.0           # bz=1 gives a perpendicular shock; bx=1 a parallel shock

[algorithms]
field_propagator:   "FDTD2"                # (FDTD2)
particle_pusher:    "boris"                # (boris)
field_interpolator: "linear_1st_unrolled"  # (linear_1st, linear_1st_unrolled)
current_depositer:  "zigzag_1st_atomic"    # (zigzag_1st, zigzag_1st_atomic)
current_filter:     "binomial2"            # (binomial2, binomial2_3d)
tile_partitioning:  "hilbert_curve"        # (hilbert_curve, caterpillar_track)

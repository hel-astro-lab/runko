[io]
outdir:  "auto"        # output directory ("auto" → "runko_output")
prefix:  "3d_"         # filename prefix for output files
postfix: "_v9_faraday" # filename postfix for output files
output_interval: 1000  # write field snapshots every N laps

stride: 2              # [emf] field output stride (downsample factor)
n_prtcls: 5000         # [prtcl] number of particles to sample for particle snapshots
spectra_nbins: 256     # [pspectra] number of bins for particle spectra
spectra_umin:  1e-2    # [pspectra] lower u boundary (log10 scale)
spectra_umax:  1e3     # [pspectra] upper u boundary (log10 scale)

[grid]
Nx: 1                # number of MPI tiles per dimension
Ny: 8
Nz: 8
NxMesh: 65536        # grid cells per tile per dimension (dx=dy=dz=1)
NyMesh: 16
NzMesh: 16
xmin: 0              # lower corner of the domain in code units
ymin: 0
zmin: 0

[simulation]
Nt:  200000              # total number of time steps
cfl: 0.5               # Courant number dt/dx; must be <=0.5

[particles]
ppc: 2                 # macro-particles per cell per species
m0: 1                  # electron mass in normalized units
m1: 1                  # ion/positron mass in normalized units
theta: 1e-4            # electron temperature kT/(mc²)
theta_ratio: 1         # ion-to-electron temperature ratio

[problem]
sigma: 6.0             # magnetization σ = B²/(4π γ n m c²)
c_omp: 25              # skin-depth resolution c/ωp in cells
upstream_gamma: 10.0    # bulk Lorentz factor of the upstream flow
n_filter_passes: 8     # current smoothing passes per step (halo refresh every 3rd)

bx_proj: 0.0           # B-field direction cosines
by_proj: 0.0           # (must satisfy bx² + by² + bz² = 1)
bz_proj: 1.0           # bz=1 gives a perpendicular shock; bx=1 a parallel shock


[algorithms]
field_propagator:   "stencil"              # (FDTD2, stencil)
particle_pusher:    "faraday"              # (boris, higuera_cary, faraday)
field_interpolator: "linear_1st"           # (linear_1st, linear_1st_unrolled)
current_depositer:  "zigzag_1st_atomic"    # (zigzag_1st, zigzag_1st_atomic)
current_filter:     "binomial2_unrolled"   # (binomial2, binomial2_unrolled)
tile_partitioning:  "hilbert_curve"        # (hilbert_curve, caterpillar_track)

# Stencil coefficients StencilCylindricalDivFree_2x2 optimized along x axis
# x-axis: perp1=y, perp2=z
stencil_x_delta:     -0.13512912586798165
stencil_x_gamma:      0.016100341594971104
stencil_x_beta_p1:    0.022350417588794424
stencil_x_beta_p2:    0.022350417588794424
stencil_x_zeta_p1:    0.012206124727660462
stencil_x_zeta_p2:    0.012206124727660462
# y-axis: perp1=z, perp2=x
stencil_y_delta:      0.010144292861133962
stencil_y_gamma:      0.012206124727660462
stencil_y_beta_p1:    0.022350417588794424
stencil_y_beta_p2:   -0.11902878427301054
stencil_y_zeta_p1:    0.012206124727660462
stencil_y_zeta_p2:    0.016100341594971104
# z-axis: perp1=x, perp2=y
stencil_z_delta:      0.010144292861133962
stencil_z_gamma:      0.012206124727660462
stencil_z_beta_p1:   -0.11902878427301054
stencil_z_beta_p2:    0.022350417588794424
stencil_z_zeta_p1:    0.016100341594971104
stencil_z_zeta_p2:    0.012206124727660462

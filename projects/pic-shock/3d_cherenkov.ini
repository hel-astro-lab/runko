[io]
io_outdir:  "auto"        # output directory ("auto" → "runko_output")
io_outdir_prefix:  "3d_cherenkov_"         # filename prefix for output files
io_outdir_postfix: "_v6_faraday_stencil26mar"    # filename postfix for output files
io_output_interval: 50    # write field snapshots every N laps

io_grid_stride: 1              # [emf] field output stride (downsample factor)
io_n_sampled_prtcls: 2000  # [prtcl ]number of particles to sample for particle snapshots
io_n_spectra_bins: 256     # [pspectra] number of bins for particle spectra
io_spectra_umin:  1e-2    # [pspectra] lower u boundary (log10 scale)
io_spectra_umax:  1e3     # [pspectra] upper u boundary (log10 scale)

[grid]
n_tiles: [32, 2, 2]
n_cells_per_tile: [32, 16, 16]

[simulation]
n_laps:  10000             # total number of time steps
cfl: 0.5               # Courant number dt/dx; must be <=0.5

[particles]
ppc: 4                 # macro-particles per cell per species
m0: 1                  # electron mass in normalized units
m1: 1                  # ion/positron mass in normalized units
theta0: 1e-5            # electron temperature kT/(mc²)
theta1_to_theta0: 1         # ion-to-electron temperature ratio

[problem]
sigma: 3.0             # magnetization σ = B²/(4π γ n m c²)
n_cells_per_skindepth: 10              # skin-depth resolution c/ωp in cells
upstream_gamma: 5.0    # bulk Lorentz factor of the upstream flow
n_filter_passes: 8     # current smoothing passes per step (halo refresh every 3rd)

# B-field direction cosines
# (must satisfy bx² + by² + bz² = 1)
# bz=1 gives a perpendicular shock; bx=1 a parallel shock
b_proj: [0.0, 0.0, 1.0]


[algorithms]
field_propagator:   "stencil"              # (FDTD2, stencil)
particle_pusher:    "faraday"              # (boris, higuera_cary, faraday)
field_interpolator: "linear_1st_unrolled"  # (linear_1st, linear_1st_unrolled)
current_depositer:  "zigzag_1st_atomic"    # (zigzag_1st, zigzag_1st_atomic)
current_filter:     "binomial2_unrolled"   # (binomial2, binomial2_unrolled)
tile_partitioning:  "hilbert_curve"        # (hilbert_curve, caterpillar_track)

# Stencil coefficients StencilCylindricalDivFree(N=2, M=2) optimized along x axis
# x-axis: perp1=y, perp2=z
stencil_x_delta:     -0.13512912586798165
stencil_x_gamma:      0.016100341594971104
stencil_x_beta_p1:    0.022350417588794424
stencil_x_beta_p2:    0.022350417588794424
stencil_x_zeta_p1:    0.012206124727660462
stencil_x_zeta_p2:    0.012206124727660462
# y-axis: perp1=z, perp2=x
stencil_y_delta:      0.010144292861133962
stencil_y_gamma:      0.012206124727660462
stencil_y_beta_p1:    0.022350417588794424
stencil_y_beta_p2:   -0.11902878427301054
stencil_y_zeta_p1:    0.012206124727660462
stencil_y_zeta_p2:    0.016100341594971104
# z-axis: perp1=x, perp2=y
stencil_z_delta:      0.010144292861133962
stencil_z_gamma:      0.012206124727660462
stencil_z_beta_p1:   -0.11902878427301054
stencil_z_beta_p2:    0.022350417588794424
stencil_z_zeta_p1:    0.016100341594971104
stencil_z_zeta_p2:    0.012206124727660462

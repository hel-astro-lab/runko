[io]
io_outdir:  "auto"
io_outdir_prefix:  "3d_"
io_outidr_postfix: "_v1"
io_output_interval: 20
io_n_sampled_prtcls: 2
io_grid_stride: 1

[grid]
n_tiles: [1, 1, 1]
n_cells_per_tile: [160, 160, 160]

[simulation]
cfl: 0.4
fixed_antenna: False
Bperp_to_B0: 0.8

[particles]
ppc: 2
m0: 1
m1: 1
theta0: 0.3
theta1_to_theta0: 1

[problem]
sigma: 1
n_cells_per_skindepth: 1
n_filter_passes: 8
modes_par: 1
modes_perp: 1

[algorithms]
field_propagator:   "fdtd2"
particle_pusher:    "boris"
field_interpolator: "linear_1st"
current_depositer:  "zigzag_1st_atomic"
current_filter:     "binomial2_unrolled"
tile_partitioning:  "hilbert_curve"
